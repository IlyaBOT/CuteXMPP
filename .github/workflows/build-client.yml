name: Build Client

on:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

env:
  APP_NAME: CuteXMPP
  QT_VERSION: 6.8.3
  QXMPP_VERSION: 1.14.4

jobs:
  windows-x64:
    name: Windows x64
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSYS2
        id: msys2
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          location: C:\
          release: false
          update: true
          install: >-
            mingw-w64-ucrt-x86_64-gcc
            mingw-w64-ucrt-x86_64-cmake
            mingw-w64-ucrt-x86_64-ninja
            mingw-w64-ucrt-x86_64-qt6-base
            mingw-w64-ucrt-x86_64-qca-qt6
            mingw-w64-ucrt-x86_64-qxmpp

      - name: Configure
        shell: pwsh
        run: cmake --fresh --preset windows-release

      - name: Build
        shell: pwsh
        run: cmake --build --preset windows-release --parallel

      - name: Package
        shell: pwsh
        run: ./scripts/ci/package_windows.ps1 -BuildDir build/windows-release -DistDir dist/windows

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: CuteXMPP-windows-x64
          if-no-files-found: error
          path: dist/windows/CuteXMPP-windows-x64.zip

  linux-x64:
    name: Linux x64
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system packages
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            curl \
            desktop-file-utils \
            libfuse2 \
            ninja-build \
            patchelf \
            p7zip-full

      - name: Install Qt with aqt
        shell: bash
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install "aqtinstall==3.3.0"
          python3 -m aqt install-qt linux desktop "${QT_VERSION}" linux_gcc_64 --outputdir "${GITHUB_WORKSPACE}/Qt" --external 7z
          qmake_path="$(find "${GITHUB_WORKSPACE}/Qt/${QT_VERSION}" -type f \( -name qmake6 -o -name qmake \) -path '*/bin/*' | head -n 1)"
          if [[ -z "${qmake_path}" ]]; then
            echo "[ERROR] Failed to locate qmake in the Qt installation." >&2
            exit 1
          fi
          qt_root_dir="$(cd "$(dirname "${qmake_path}")/.." && pwd)"
          echo "QT_ROOT_DIR=${qt_root_dir}" >> "${GITHUB_ENV}"
          echo "${qt_root_dir}/bin" >> "${GITHUB_PATH}"
          echo "[INFO] Qt root: ${qt_root_dir}"

      - name: Build static QXmpp
        id: qxmpp
        shell: bash
        run: bash scripts/ci/build_qxmpp.sh

      - name: Configure
        shell: bash
        run: >
          cmake --fresh --preset linux-release
          -DCMAKE_PREFIX_PATH="${{ steps.qxmpp.outputs.qt_prefix_path }};${{ steps.qxmpp.outputs.install_prefix }}"

      - name: Build
        shell: bash
        run: cmake --build --preset linux-release --parallel

      - name: Package
        shell: bash
        env:
          QMAKE_BIN: ${{ steps.qxmpp.outputs.qmake_bin }}
          QT_ROOT_DIR: ${{ env.QT_ROOT_DIR }}
        run: bash scripts/ci/package_linux.sh

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: CuteXMPP-linux-x64
          if-no-files-found: error
          path: |
            dist/linux/CuteXMPP-linux-x64.AppImage
            dist/linux/CuteXMPP-linux-x64.tar.gz

  macos-x64:
    name: macOS x64
    runs-on: macos-13

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          host: mac
          target: desktop
          arch: clang_64
          cache: true

      - name: Build static QXmpp
        id: qxmpp
        shell: bash
        env:
          QXMPP_BUILD_SHARED: ON
        run: bash scripts/ci/build_qxmpp.sh

      - name: Configure
        shell: bash
        run: >
          cmake --fresh --preset macos-release
          -DCMAKE_PREFIX_PATH="${{ steps.qxmpp.outputs.qt_prefix_path }};${{ steps.qxmpp.outputs.install_prefix }}"

      - name: Build
        shell: bash
        run: cmake --build --preset macos-release --parallel

      - name: Package
        shell: bash
        env:
          QMAKE_BIN: ${{ steps.qxmpp.outputs.qmake_bin }}
          QT_ROOT_DIR: ${{ env.QT_ROOT_DIR }}
          QXMPP_INSTALL_PREFIX: ${{ steps.qxmpp.outputs.install_prefix }}
        run: bash scripts/ci/package_macos.sh

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: CuteXMPP-macos-x64
          if-no-files-found: error
          path: |
            dist/macos/CuteXMPP.app
            dist/macos/CuteXMPP-macos-x64.dmg
